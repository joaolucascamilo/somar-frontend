<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esqueci a senha — SOMAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles.css">
  <style>
    .tela-auth {
      min-height: calc(100vh - 200px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }
    .cartao-auth {
      width: 100%;
      max-width: 440px;
      background: #fff;
      border: 1px solid #e3ddd0;
      border-radius: 6px;
      padding: 40px 36px;
      box-shadow: var(--sombra-card);
    }
    .cartao-auth .eyebrow {
      font-family: var(--fonte-mono);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--amarelo-sinal-escuro);
      display: block;
      margin-bottom: 8px;
    }
    .cartao-auth h1 {
      font-size: 1.6rem;
      margin-bottom: 10px;
    }
    .descricao {
      font-size: 0.92rem;
      color: var(--grafite-600);
      margin-bottom: 24px;
    }
    .rodape-auth {
      margin-top: 22px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--grafite-600);
    }
    .rodape-auth a {
      color: var(--amarelo-sinal-escuro);
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .tela-auth { padding: 32px 0; align-items: flex-start; }
      .cartao-auth { padding: 28px 20px; border-radius: 0; border-left: none; border-right: none; }
    }
  </style>
</head>
<body>
  <div id="navbar-root"></div>

  <main class="tela-auth">
    <div class="cartao-auth">
      <span class="eyebrow">Recuperação de acesso</span>
      <h1>Esqueceu a senha?</h1>
      <p class="descricao">Informe seu e-mail cadastrado e enviaremos um link para você criar uma nova senha.</p>

      <div id="area-mensagem"></div>

      <form id="form-esqueci">
        <div class="campo">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="seu@email.com">
        </div>
        <button type="submit" class="btn btn-primario btn-bloco" id="btn-enviar">Enviar link</button>
      </form>

      <div class="rodape-auth">
        Lembrou a senha? <a href="/public/login.html">Voltar ao login</a>
      </div>
    </div>
  </main>

  <script src="/shared/config.js"></script>
  <script src="/shared/auth.js"></script>
  <script src="/shared/api.js"></script>
  <script src="/shared/navbar.js"></script>
  <script>
    montarNavbar('');

    const form = document.getElementById('form-esqueci');
    const areaMensagem = document.getElementById('area-mensagem');
    const btnEnviar = document.getElementById('btn-enviar');

    function mostrarErro(msg) {
      areaMensagem.innerHTML = `<div class="aviso-form">${msg}</div>`;
    }
    function mostrarSucesso(msg) {
      areaMensagem.innerHTML = `<div class="sucesso-form">${msg}</div>`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      areaMensagem.innerHTML = '';
      btnEnviar.disabled = true;
      btnEnviar.textContent = 'Enviando...';

      const email = document.getElementById('email').value.trim();

      try {
        await Api.post(
          `${CONFIG.USER_SERVICE_URL}/api/auth/esqueci-senha`,
          { email },
          false
        );

        mostrarSucesso('Se o e-mail estiver cadastrado, você receberá um link para redefinir a senha em instantes.');
        form.style.display = 'none';

      } catch (erro) {
        console.error(erro);
        if (erro.status === 0) {
          mostrarErro(erro.message);
        } else {
          mostrarErro('Não foi possível enviar o e-mail. Tente novamente em alguns instantes.');
        }
        btnEnviar.disabled = false;
        btnEnviar.textContent = 'Enviar link';
      }
    });
  </script>
</body>
</html>
