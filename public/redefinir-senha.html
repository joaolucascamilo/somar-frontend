<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir senha — SOMAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles.css">
  <style>
    .tela-auth {
      min-height: calc(100vh - 200px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }
    .cartao-auth {
      width: 100%;
      max-width: 440px;
      background: #fff;
      border: 1px solid #e3ddd0;
      border-radius: 6px;
      padding: 40px 36px;
      box-shadow: var(--sombra-card);
    }
    .cartao-auth .eyebrow {
      font-family: var(--fonte-mono);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--amarelo-sinal-escuro);
      display: block;
      margin-bottom: 8px;
    }
    .cartao-auth h1 {
      font-size: 1.6rem;
      margin-bottom: 26px;
    }
    .dica-senha {
      font-size: 0.78rem;
      color: var(--grafite-600);
      margin-top: 4px;
    }
    .rodape-auth {
      margin-top: 22px;
      text-align: center;
      font-size: 0.9rem;
      color: var(--grafite-600);
    }
    .rodape-auth a {
      color: var(--amarelo-sinal-escuro);
      font-weight: 600;
    }

    @media (max-width: 480px) {
      .tela-auth { padding: 32px 0; align-items: flex-start; }
      .cartao-auth { padding: 28px 20px; border-radius: 0; border-left: none; border-right: none; }
    }
  </style>
</head>
<body>
  <div id="navbar-root"></div>

  <main class="tela-auth">
    <div class="cartao-auth">
      <span class="eyebrow">Recuperação de acesso</span>
      <h1>Criar nova senha</h1>

      <div id="area-mensagem"></div>

      <form id="form-redefinir">
        <div class="campo">
          <label for="nova-senha">Nova senha</label>
          <input type="password" id="nova-senha" name="nova-senha" required minlength="6" autocomplete="new-password" placeholder="••••••••">
          <div class="dica-senha">Mínimo de 6 caracteres.</div>
        </div>
        <div class="campo">
          <label for="confirmar-senha">Confirmar nova senha</label>
          <input type="password" id="confirmar-senha" name="confirmar-senha" required minlength="6" autocomplete="new-password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primario btn-bloco" id="btn-redefinir">Salvar nova senha</button>
      </form>

      <div class="rodape-auth">
        <a href="/public/login.html">Voltar ao login</a>
      </div>
    </div>
  </main>

  <script src="/shared/config.js"></script>
  <script src="/shared/auth.js"></script>
  <script src="/shared/api.js"></script>
  <script src="/shared/navbar.js"></script>
  <script>
    montarNavbar('');

    const areaMensagem = document.getElementById('area-mensagem');
    const form = document.getElementById('form-redefinir');
    const btnRedefinir = document.getElementById('btn-redefinir');

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    function mostrarErro(msg) {
      areaMensagem.innerHTML = `<div class="aviso-form">${msg}</div>`;
    }

    if (!token) {
      mostrarErro('Link inválido. Nenhum token encontrado.');
      form.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      areaMensagem.innerHTML = '';

      const novaSenha = document.getElementById('nova-senha').value;
      const confirmarSenha = document.getElementById('confirmar-senha').value;

      if (novaSenha !== confirmarSenha) {
        mostrarErro('As senhas não coincidem.');
        return;
      }

      btnRedefinir.disabled = true;
      btnRedefinir.textContent = 'Salvando...';

      try {
        await Api.post(
          `${CONFIG.USER_SERVICE_URL}/api/auth/redefinir-senha`,
          { token, novaSenha },
          false
        );

        sessionStorage.setItem('somar_msg_sucesso', 'Senha redefinida com sucesso! Faça login com sua nova senha.');
        window.location.href = '/public/login.html';

      } catch (erro) {
        console.error(erro);
        if (erro.status === 0) {
          mostrarErro(erro.message);
        } else {
          mostrarErro('Link inválido ou expirado. <a href="/public/esqueci-senha.html">Solicite um novo link.</a>');
        }
        btnRedefinir.disabled = false;
        btnRedefinir.textContent = 'Salvar nova senha';
      }
    });
  </script>
</body>
</html>
