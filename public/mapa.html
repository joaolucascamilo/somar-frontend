<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa público — SOMAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    .topo-pagina {
      padding: 40px 0 24px;
      border-bottom: 1px solid #e3ddd0;
    }
    .topo-pagina .eyebrow {
      font-family: var(--fonte-mono);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--amarelo-sinal-escuro);
      display: block;
      margin-bottom: 8px;
    }
    .topo-pagina h1 {
      font-size: 1.8rem;
    }

    .area-conteudo {
      padding: 32px 0 64px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 28px;
    }

    .painel-filtros {
      background: #fff;
      border: 1px solid #e3ddd0;
      border-radius: 4px;
      padding: 20px;
      align-self: start;
    }
    .painel-filtros h3 {
      font-size: 0.9rem;
      margin-bottom: 14px;
    }

    .lista-ocorrencias {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 640px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .item-lista {
      background: #fff;
      border: 1px solid #e3ddd0;
      border-radius: 4px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.15s ease;
    }
    .item-lista:hover {
      border-color: var(--amarelo-sinal-escuro);
    }
    .item-lista .linha-topo-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .item-lista .tipo-item {
      font-weight: 600;
      font-size: 0.92rem;
    }
    .item-lista .endereco-item {
      font-size: 0.82rem;
      color: var(--grafite-600);
    }

    #mapa {
      border-radius: 6px;
      min-height: 640px;
      border: 1px solid #c9c2af;
      z-index: 0;
    }

    @media (max-width: 900px) {
      .area-conteudo { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="navbar-root"></div>

  <div class="topo-pagina">
    <div class="container">
      <span class="eyebrow">Transparência pública</span>
      <h1>Ocorrências registradas na cidade</h1>
    </div>
  </div>

  <main class="container area-conteudo">
    <aside class="painel-filtros">
      <h3>Filtrar por tipo</h3>
      <div class="campo">
        <select id="filtro-tipo">
          <option value="">Todos os tipos</option>
          <option value="1">Buraco em via pública</option>
          <option value="2">Pavimentação danificada</option>
          <option value="3">Falha na drenagem</option>
          <option value="4">Calçada irregular</option>
          <option value="5">Falha na iluminação</option>
          <option value="6">Sinalização defeituosa</option>
          <option value="7">Acúmulo de lixo</option>
          <option value="99">Outros</option>
        </select>
      </div>
    </aside>

    <section>
      <div id="mapa"></div>

      <h3 style="margin: 28px 0 14px; font-size: 1rem;">Lista de ocorrências</h3>
      <div id="lista-ocorrencias" class="lista-ocorrencias">
        <div class="carregando"><span class="spinner"></span> Carregando ocorrências...</div>
      </div>
    </section>
  </main>

  <script src="../shared/config.js"></script>
  <script src="../shared/auth.js"></script>
  <script src="../shared/api.js"></script>
  <script src="../shared/enums.js"></script>
  <script src="../shared/navbar.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    montarNavbar('mapa');

    // --- Mapa (Leaflet + OpenStreetMap) ---

    const RECIFE_CENTER = [-8.0539, -34.8811];
    const RAIO_METROS = 30000;

    const mapa = L.map('mapa').setView(RECIFE_CENTER, 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
    }).addTo(mapa);

    // Mapeia as categorias do ms-geo para os IDs numéricos do TipoOcorrencia
    const CATEGORIA_PARA_TIPO = {
      BURACO: 1, BURACO_VIA: 1,
      PAVIMENTACAO: 2, PAVIMENTACAO_DANIFICADA: 2,
      DRENAGEM: 3, FALHA_DRENAGEM: 3,
      CALCADA: 4, CALCADA_IRREGULAR: 4,
      ILUMINACAO: 5, FALHA_ILUMINACAO: 5,
      SINALIZACAO: 6, SINALIZACAO_DEFEITUOSA: 6,
      LIXO: 7, ACUMULO_LIXO: 7,
      OUTROS: 99,
    };

    const COR_POR_TIPO = {
      1: '#DC2626', 2: '#F59E0B', 3: '#3B82F6',
      4: '#8B5CF6', 5: '#F97316', 6: '#EF4444',
      7: '#6B7280', 99: '#374151',
    };

    function criarIcone(cor) {
      return L.divIcon({
        html: `<div style="background:${cor};width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.45)"></div>`,
        className: '',
        iconSize: [14, 14],
        iconAnchor: [7, 7],
        popupAnchor: [0, -10],
      });
    }

    const camadaMarcadores = L.layerGroup().addTo(mapa);
    let pontosMapa = [];

    function renderizarMarcadores(pontos) {
      camadaMarcadores.clearLayers();
      pontos.forEach(p => {
        if (p.latitude == null || p.longitude == null) return;
        const tipoId = CATEGORIA_PARA_TIPO[p.categoria] ?? 99;
        const tipoInfo = TipoOcorrencia[tipoId] || { label: p.categoria || 'Ocorrência', icone: '📌' };
        const cor = COR_POR_TIPO[tipoId] || '#374151';

        L.marker([p.latitude, p.longitude], { icon: criarIcone(cor) })
          .bindPopup(`
            <strong>${tipoInfo.icone} ${tipoInfo.label}</strong><br>
            Denúncias: ${p.quantidadeDenuncias ?? 1}<br>
            <a href="/public/ocorrencia.html?id=${p.id}" style="color:#b45309">Ver detalhes →</a>
          `)
          .addTo(camadaMarcadores);
      });
    }

    async function carregarPontosMapa() {
      try {
        const [lat, lng] = RECIFE_CENTER;
        const dados = await Api.get(
          `${CONFIG.GEO_SERVICE_URL}/api/geo/ocorrencias/raio?lat=${lat}&lng=${lng}&raioMetros=${RAIO_METROS}`,
          false
        );
        pontosMapa = dados || [];
        renderizarMarcadores(pontosMapa);
      } catch (erro) {
        console.warn('ms-geo indisponível, mapa sem marcadores:', erro.message);
      }
    }

    // --- Lista de ocorrências (report-service) ---

    let todasOcorrencias = [];

    function renderizarLista(ocorrencias) {
      const container = document.getElementById('lista-ocorrencias');

      if (!ocorrencias || ocorrencias.length === 0) {
        container.innerHTML = `
          <div class="estado-vazio">
            <span class="icone">📭</span>
            Nenhuma ocorrência encontrada para este filtro.
          </div>`;
        return;
      }

      container.innerHTML = ocorrencias.map(oc => {
        const tipo = TipoOcorrencia[oc.tipoOcorrencia] || { label: 'Tipo desconhecido', icone: '📌' };
        const status = StatusOcorrencia[oc.status] || { label: 'Desconhecido', cor: '#999' };
        const endereco = oc.endereco
          ? `${oc.endereco.rua}, ${oc.endereco.numero} — ${oc.endereco.bairro}`
          : 'Endereço não informado';

        return `
          <div class="item-lista" onclick="window.location.href='/public/ocorrencia.html?id=${oc.id}'">
            <div class="linha-topo-item">
              <span class="tipo-item">${tipo.icone} ${tipo.label}</span>
              <span class="badge" style="background:${status.cor}1A; color:${status.cor};">${status.label}</span>
            </div>
            <div class="endereco-item">${endereco}</div>
          </div>
        `;
      }).join('');
    }

    async function carregarOcorrencias() {
      try {
        const dados = await Api.get(`${CONFIG.REPORT_SERVICE_URL}/api/ocorrencias/mapa`, false);
        todasOcorrencias = dados || [];
        renderizarLista(todasOcorrencias);
      } catch (erro) {
        console.error(erro);
        document.getElementById('lista-ocorrencias').innerHTML = `
          <div class="aviso-form">
            Não foi possível carregar as ocorrências. ${erro.message || ''}
          </div>`;
      }
    }

    // --- Filtro (sincroniza lista + marcadores) ---

    document.getElementById('filtro-tipo').addEventListener('change', (e) => {
      const tipoSelecionado = e.target.value; // string numérica, ex: "1"

      if (!tipoSelecionado) {
        renderizarLista(todasOcorrencias);
        renderizarMarcadores(pontosMapa);
        return;
      }

      renderizarLista(todasOcorrencias.filter(
        oc => String(oc.tipoOcorrencia) === tipoSelecionado
      ));

      // Descobre quais strings de categoria ms-geo correspondem a este tipo
      const categoriasFiltro = new Set(
        Object.entries(CATEGORIA_PARA_TIPO)
          .filter(([, id]) => String(id) === tipoSelecionado)
          .map(([cat]) => cat)
      );
      renderizarMarcadores(pontosMapa.filter(p => categoriasFiltro.has(p.categoria)));
    });

    carregarOcorrencias();
    carregarPontosMapa();
  </script>
</body>
</html>
