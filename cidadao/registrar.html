<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar ocorrência — SOMAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/styles.css">
  <style>
    .topo-pagina {
      padding: 40px 0 24px;
      border-bottom: 1px solid #e3ddd0;
    }
    .topo-pagina .eyebrow {
      font-family: var(--fonte-mono);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--amarelo-sinal-escuro);
      display: block;
      margin-bottom: 8px;
    }
    .area-form {
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 0 64px;
    }
    .bloco-form {
      background: #fff;
      border: 1px solid #e3ddd0;
      border-radius: 4px;
      padding: 28px 30px;
      margin-bottom: 20px;
    }
    .bloco-form h3 {
      font-size: 0.95rem;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e3ddd0;
    }
    .grade-tipos {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: minmax(88px, auto);
      gap: 10px;
      margin-bottom: 4px;
    }
    .opcao-tipo {
      position: relative;
      display: flex;
    }
    .opcao-tipo input {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      margin: 0;
    }
    .opcao-tipo .cartao-tipo {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1.5px solid #d8d2c2;
      border-radius: 4px;
      padding: 12px 8px;
      text-align: center;
      font-size: 0.76rem;
      color: var(--grafite-600);
      transition: all 0.15s ease;
    }
    .opcao-tipo .cartao-tipo .ic {
      font-size: 1.3rem;
      margin-bottom: 4px;
    }
    .opcao-tipo input:checked + .cartao-tipo {
      border-color: var(--amarelo-sinal-escuro);
      background: #fef9e7;
      color: var(--grafite-950);
      font-weight: 600;
    }
    .opcao-tipo input:focus-visible + .cartao-tipo {
      outline: 3px solid var(--amarelo-sinal);
      outline-offset: 1px;
    }

    .zona-fotos {
      display: block;
      border: 1.5px dashed #d8d2c2;
      border-radius: 4px;
      padding: 28px;
      text-align: center;
      color: var(--grafite-600);
      cursor: pointer;
      transition: border-color 0.15s ease;
    }
    .zona-fotos:hover {
      border-color: var(--amarelo-sinal-escuro);
    }
    .zona-fotos input { display: none; }
    .lista-fotos-preview {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 14px;
    }
    .foto-preview {
      position: relative;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid #e3ddd0;
    }
    .foto-preview img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      cursor: zoom-in;
    }
    .foto-preview .remover-foto {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(20,23,26,0.78);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      cursor: pointer;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    .foto-preview .remover-foto:hover {
      background: rgba(220,38,38,0.9);
    }
    .zona-fotos-oculta {
      display: none !important;
    }
    .limite-fotos {
      font-size: 0.78rem;
      color: var(--grafite-400);
      margin-top: 8px;
    }
    .limite-fotos.atingido {
      color: var(--amarelo-sinal-escuro);
      font-weight: 600;
    }
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .lightbox.aberto {
      display: flex;
    }
    .lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 4px;
      cursor: default;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .lightbox-fechar {
      position: fixed;
      top: 14px;
      right: 18px;
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      z-index: 10000;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-fechar:hover {
      background: rgba(255,255,255,0.28);
    }
    .nota-simulacao {
      font-size: 0.78rem;
      color: var(--grafite-400);
      margin-top: 10px;
    }

    .divisor-ou {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 12px;
      color: var(--grafite-400);
      font-size: 0.78rem;
    }
    .divisor-ou::before,
    .divisor-ou::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e3ddd0;
    }
    .label-sem-numero {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: var(--grafite-600);
      margin-top: 6px;
      cursor: pointer;
      font-weight: normal;
    }
    .btn-localizacao {
      width: 100%;
    }
    .coord-display {
      font-family: var(--fonte-mono);
      font-size: 0.8rem;
      color: var(--grafite-600);
      margin-top: 8px;
    }
    .status-cep {
      font-size: 0.78rem;
      margin-top: 4px;
      min-height: 1.1em;
      color: var(--grafite-400);
    }
    .status-cep.buscando { color: var(--amarelo-sinal-escuro); }
    .status-cep.erro     { color: #DC2626; }
    .status-cep.ok       { color: #16A34A; }
    .coord-display.erro  { color: #DC2626; }
    .coord-display.ok    { color: #16A34A; }

    .campo-outros {
      display: none;
      margin-top: 18px;
      background: #fef9e7;
      border: 1.5px solid var(--amarelo-sinal-escuro);
      border-radius: 4px;
      padding: 16px 18px;
      animation: entrar 0.18s ease;
    }
    @keyframes entrar {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .campo-outros.visivel {
      display: block;
    }
    .campo-outros .campo-outros-titulo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--fonte-display);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--amarelo-sinal-escuro);
      margin-bottom: 10px;
    }
    .campo-outros textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #d8d2c2;
      border-radius: 4px;
      background: #fff;
      color: var(--grafite-950);
      font-size: 0.95rem;
      resize: vertical;
      min-height: 90px;
      transition: border-color 0.15s ease;
    }
    .campo-outros textarea:focus {
      outline: none;
      border-color: var(--amarelo-sinal-escuro);
      box-shadow: 0 0 0 3px rgba(242, 183, 5, 0.25);
    }
    .campo-outros textarea::placeholder {
      color: var(--grafite-400);
    }
    .contador-chars {
      display: block;
      text-align: right;
      font-family: var(--fonte-mono);
      font-size: 0.72rem;
      color: var(--grafite-400);
      margin-top: 5px;
    }
    .contador-chars.quase {
      color: var(--amarelo-sinal-escuro);
    }
    .contador-chars.limite {
      color: #DC2626;
    }

    @media (max-width: 600px) {
      .grade-tipos {
        grid-template-columns: repeat(2, 1fr);
      }
      .bloco-form {
        padding: 18px 16px;
      }
      .area-form {
        padding: 24px 0 48px;
      }
      .topo-pagina {
        padding: 28px 0 18px;
      }
    }
  </style>
</head>
<body>
  <div id="navbar-root"></div>

  <div class="topo-pagina">
    <div class="container">
      <span class="eyebrow">Novo protocolo</span>
      <h1>Registrar ocorrência</h1>
    </div>
  </div>

  <main class="container area-form">
    <div id="area-mensagem"></div>

    <form id="form-ocorrencia">
      <div class="bloco-form">
        <h3>1. Tipo do problema</h3>
        <div class="grade-tipos" id="grade-tipos">
          <!-- preenchido via JS a partir de enums.js -->
        </div>
        <div class="campo-outros" id="campo-outros">
          <p class="campo-outros-titulo">📌 Qual é a ocorrência?</p>
          <textarea id="detalhes-outros" maxlength="255" placeholder="Descreva o problema com o máximo de detalhes possível…"></textarea>
          <span class="contador-chars" id="contador-detalhes">0 / 255</span>
        </div>
      </div>

      <div class="bloco-form">
        <h3>2. Localização</h3>
        <div class="campo-linha">
          <div class="campo">
            <label for="rua">Rua</label>
            <input type="text" id="rua" required placeholder="Rua das Flores">
          </div>
          <div class="campo">
            <label for="numero">Número</label>
            <input type="number" id="numero" required placeholder="123" min="1">
            <label class="label-sem-numero">
              <input type="checkbox" id="sem-numero"> Sem número (S/N)
            </label>
          </div>
        </div>
        <div class="campo-linha">
          <div class="campo">
            <label for="bairro">Bairro</label>
            <input type="text" id="bairro" required placeholder="Centro">
          </div>
          <div class="campo">
            <label for="cep">CEP</label>
            <input type="text" id="cep" required placeholder="00000-000" maxlength="9" inputmode="numeric">
            <small id="status-cep" class="status-cep"></small>
          </div>
        </div>
        <div class="campo-linha">
          <div class="campo">
            <label for="cidade">Cidade</label>
            <input type="text" id="cidade" required value="Recife">
          </div>
          <div class="campo">
            <label for="estado">Estado (UF)</label>
            <input type="text" id="estado" required value="PE" maxlength="2" style="text-transform: uppercase;">
          </div>
        </div>

        <div class="divisor-ou">
          <span>ou</span>
        </div>

        <button type="button" class="btn btn-secundario btn-localizacao" id="btn-geolocalizacao" style="border-color: var(--grafite-950); color: var(--grafite-950);">
          📍 Preencher automaticamente com minha localização atual
        </button>
        <div class="coord-display" id="coord-display"></div>
      </div>

      <div class="bloco-form">
        <h3>3. Fotos</h3>
        <label class="zona-fotos" id="zona-fotos">
          <input type="file" id="input-fotos" accept="image/*" multiple>
          <span style="font-size: 1.6rem; display:block; margin-bottom: 8px;">📷</span>
          Toque para selecionar fotos ou arraste aqui
        </label>
        <p class="limite-fotos" id="limite-fotos">Máximo de 2 fotos</p>
        <div class="lista-fotos-preview" id="lista-fotos-preview"></div>
      </div>

      <button type="submit" class="btn btn-primario btn-bloco" id="btn-registrar" style="padding: 14px;">
        Registrar ocorrência
      </button>
    </form>
  </main>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Visualizar foto">
    <button class="lightbox-fechar" id="lightbox-fechar" aria-label="Fechar foto">✕</button>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script src="/shared/config.js"></script>
  <script src="/shared/auth.js"></script>
  <script src="/shared/api.js"></script>
  <script src="/shared/enums.js"></script>
  <script src="/shared/navbar.js"></script>
  <script>
    montarNavbar('registrar');
    Auth.protegerPagina(['ROLE_CIDADAO']);

    const inputNumero = document.getElementById('numero');
    const checkSemNumero = document.getElementById('sem-numero');
    checkSemNumero.addEventListener('change', () => {
      if (checkSemNumero.checked) {
        inputNumero.value = '';
        inputNumero.disabled = true;
        inputNumero.removeAttribute('required');
        inputNumero.placeholder = 'S/N';
      } else {
        inputNumero.disabled = false;
        inputNumero.setAttribute('required', '');
        inputNumero.placeholder = '123';
      }
    });

    // Monta as opções de tipo de ocorrência a partir do enum compartilhado
    const gradeTipos = document.getElementById('grade-tipos');
    gradeTipos.innerHTML = Object.entries(TipoOcorrencia).map(([codigo, info]) => `
      <label class="opcao-tipo">
        <input type="radio" name="tipoOcorrencia" value="${codigo}" ${codigo === '1' ? 'checked' : ''} required>
        <span class="cartao-tipo">
          <span class="ic">${info.icone}</span>
          ${info.label}
        </span>
      </label>
    `).join('');

    const campoOutros = document.getElementById('campo-outros');
    const detalhesOutros = document.getElementById('detalhes-outros');
    const contadorDetalhes = document.getElementById('contador-detalhes');

    detalhesOutros.addEventListener('input', () => {
      const len = detalhesOutros.value.length;
      contadorDetalhes.textContent = `${len} / 255`;
      contadorDetalhes.className = 'contador-chars' + (len >= 255 ? ' limite' : len >= 220 ? ' quase' : '');
    });

    function atualizarCampoOutros() {
      const selecionado = form.querySelector('input[name="tipoOcorrencia"]:checked');
      if (selecionado && selecionado.value === '99') {
        campoOutros.classList.add('visivel');
        detalhesOutros.setAttribute('required', '');
      } else {
        campoOutros.classList.remove('visivel');
        detalhesOutros.removeAttribute('required');
        detalhesOutros.value = '';
        contadorDetalhes.textContent = '0 / 255';
        contadorDetalhes.className = 'contador-chars';
      }
    }

    gradeTipos.addEventListener('change', atualizarCampoOutros);

    // Busca de CEP via ms-geo → ViaCEP
    const statusCep = document.getElementById('status-cep');

    function setStatusCep(msg, tipo = '') {
      statusCep.textContent = msg;
      statusCep.className = `status-cep ${tipo}`;
    }

    async function buscarCep(cep) {
      setStatusCep('Buscando...', 'buscando');
      const campoCep = document.getElementById('cep');
      campoCep.disabled = true;

      try {
        const dados = await Api.get(`${CONFIG.GEO_SERVICE_URL}/api/geo/cep/${cep}`, false);

        if (!dados || dados.erro) {
          setStatusCep('CEP não encontrado.', 'erro');
          return;
        }

        if (dados.logradouro) document.getElementById('rua').value = dados.logradouro;
        if (dados.bairro)     document.getElementById('bairro').value = dados.bairro;
        if (dados.localidade) document.getElementById('cidade').value = dados.localidade;
        if (dados.uf)         document.getElementById('estado').value = dados.uf;

        setStatusCep('Endereço preenchido automaticamente.', 'ok');
        document.getElementById('numero').focus();
      } catch (erro) {
        setStatusCep('Não foi possível consultar o CEP.', 'erro');
        console.warn('Busca CEP:', erro.message);
      } finally {
        campoCep.disabled = false;
      }
    }

    document.getElementById('cep').addEventListener('input', (e) => {
      const digits = e.target.value.replace(/\D/g, '').slice(0, 8);
      e.target.value = digits.length > 5
        ? digits.slice(0, 5) + '-' + digits.slice(5)
        : digits;
      if (digits.length === 8) buscarCep(digits);
      else if (statusCep.textContent) setStatusCep('');
    });

    // Geolocalização do navegador
    let coordenadas = { latitude: null, longitude: null };
    document.getElementById('btn-geolocalizacao').addEventListener('click', () => {
      const display = document.getElementById('coord-display');
      if (!navigator.geolocation) {
        display.textContent = 'Geolocalização não suportada neste navegador.';
        return;
      }
      display.textContent = 'Obtendo localização...';
      display.className = 'coord-display';
      navigator.geolocation.getCurrentPosition(
        async (pos) => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const precisao = Math.round(pos.coords.accuracy);
          display.textContent = 'Verificando localização...';

          try {
            const dados = await Api.get(
              `${CONFIG.GEO_SERVICE_URL}/api/geo/reverse?lat=${lat}&lon=${lon}`,
              false
            );

            console.log('[reverse geocode] resposta da API:', dados);

            const cidadeReversa = dados.cidade || dados.localidade || '';
            if (cidadeReversa.toLowerCase() !== 'recife') {
              display.textContent = `Fora do Recife (${cidadeReversa || 'local desconhecido'}). Só é possível registrar ocorrências no município do Recife.`;
              display.className = 'coord-display erro';
              return;
            }

            coordenadas.latitude = lat;
            coordenadas.longitude = lon;

            const rua = dados.logradouro || dados.rua || '';
            if (rua) document.getElementById('rua').value = rua;
            if (dados.bairro) document.getElementById('bairro').value = dados.bairro;
            document.getElementById('cidade').value = cidadeReversa;
            document.getElementById('estado').value = dados.uf || dados.estado || 'PE';
            if (dados.cep) {
              document.getElementById('cep').value = String(dados.cep).replace(/\D/g, '');
            }

            display.innerHTML = `Endereço preenchido via GPS (${lat.toFixed(5)}, ${lon.toFixed(5)}). <strong>Confira se os campos estão corretos</strong> antes de enviar — o GPS pode ser impreciso próximo a divisas entre municípios.`;
            display.className = 'coord-display ok';
            document.getElementById('numero').focus();
          } catch (erro) {
            display.textContent = 'Não foi possível verificar a localização. Tente novamente.';
            display.className = 'coord-display erro';
            console.warn('Reverse geocode:', erro.message);
          }
        },
        (err) => {
          display.textContent = 'Não foi possível obter a localização. Você pode continuar sem ela.';
          display.className = 'coord-display erro';
          console.warn(err);
        }
      );
    });

    const MAX_FOTOS = 2;
    let fotos = [];
    const inputFotos = document.getElementById('input-fotos');
    const listaPreview = document.getElementById('lista-fotos-preview');
    const limiteFotos = document.getElementById('limite-fotos');

    inputFotos.addEventListener('change', (e) => {
      const arquivos = Array.from(e.target.files);
      const disponiveis = MAX_FOTOS - fotos.length;
      arquivos.slice(0, disponiveis).forEach(arquivo => {
        const urlPreview = URL.createObjectURL(arquivo);
        fotos.push({ nomeArquivo: arquivo.name, file: arquivo, urlPreview });
      });
      renderizarPreviews();
      inputFotos.value = '';
    });

    function renderizarPreviews() {
      listaPreview.innerHTML = fotos.map((f, idx) => `
        <div class="foto-preview">
          <img src="${f.urlPreview}" alt="${f.nomeArquivo}" data-idx="${idx}">
          <button type="button" class="remover-foto" data-idx="${idx}" aria-label="Remover foto">✕</button>
        </div>
      `).join('');

      listaPreview.querySelectorAll('.remover-foto').forEach(btn => {
        btn.addEventListener('click', () => {
          fotos.splice(Number(btn.dataset.idx), 1);
          renderizarPreviews();
        });
      });

      listaPreview.querySelectorAll('.foto-preview img').forEach(img => {
        img.addEventListener('click', () => {
          const idx = Number(img.dataset.idx);
          abrirLightbox(fotos[idx].urlPreview, fotos[idx].nomeArquivo);
        });
      });

      const zonaFotos = document.getElementById('zona-fotos');
      if (fotos.length >= MAX_FOTOS) {
        zonaFotos.classList.add('zona-fotos-oculta');
        limiteFotos.textContent = 'Limite de 2 fotos atingido. Remova uma foto para adicionar outra.';
        limiteFotos.classList.add('atingido');
      } else {
        zonaFotos.classList.remove('zona-fotos-oculta');
        const restantes = MAX_FOTOS - fotos.length;
        limiteFotos.textContent = fotos.length === 0
          ? 'Máximo de 2 fotos'
          : `${fotos.length}/2 foto(s) adicionada(s). Você pode adicionar mais ${restantes}.`;
        limiteFotos.classList.remove('atingido');
      }
    }

    function abrirLightbox(src, alt) {
      const lb = document.getElementById('lightbox');
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox-img').alt = alt || '';
      lb.classList.add('aberto');
      document.body.style.overflow = 'hidden';
    }

    function fecharLightbox() {
      document.getElementById('lightbox').classList.remove('aberto');
      document.body.style.overflow = '';
    }

    document.getElementById('lightbox').addEventListener('click', fecharLightbox);
    document.getElementById('lightbox-fechar').addEventListener('click', (e) => {
      e.stopPropagation();
      fecharLightbox();
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') fecharLightbox(); });

    // Submissão do formulário
    const form = document.getElementById('form-ocorrencia');
    const areaMensagem = document.getElementById('area-mensagem');
    const btnRegistrar = document.getElementById('btn-registrar');

    function mostrarErro(msg) {
      areaMensagem.innerHTML = `<div class="aviso-form">${msg}</div>`;
      areaMensagem.scrollIntoView({ behavior: 'smooth' });
    }
    function mostrarSucesso(msg) {
      areaMensagem.innerHTML = `<div class="sucesso-form">${msg}</div>`;
      areaMensagem.scrollIntoView({ behavior: 'smooth' });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      areaMensagem.innerHTML = '';
      btnRegistrar.disabled = true;

      const cidadeValor = document.getElementById('cidade').value.trim();
      if (cidadeValor.toLowerCase() !== 'recife') {
        mostrarErro('Só é possível registrar ocorrências no município do Recife.');
        btnRegistrar.disabled = false;
        return;
      }

      // Etapa 1 e 2: obter presigned URL e fazer upload direto no S3
      let fotoOcorrencia = [];
      if (fotos.length > 0) {
        btnRegistrar.textContent = `Enviando ${fotos.length} foto(s)...`;
        try {
          fotoOcorrencia = await Promise.all(fotos.map(async (foto) => {
            const { uploadUrl, key, bucket } = await Api.get(
              `${CONFIG.REPORT_SERVICE_URL}/api/fotos/presigned-url?nomeArquivo=${encodeURIComponent(foto.nomeArquivo)}`
            );
            await Api.uploadS3(uploadUrl, foto.file);
            return { nomeArquivo: foto.nomeArquivo, url: key, bucket };
          }));
        } catch (erro) {
          console.error(erro);
          mostrarErro(erro.status === 0 ? erro.message : 'Não foi possível fazer o upload das fotos. Tente novamente.');
          btnRegistrar.disabled = false;
          btnRegistrar.textContent = 'Registrar ocorrência';
          return;
        }
      }

      // Etapa 3: criar a ocorrência com a referência das fotos
      btnRegistrar.textContent = 'Registrando...';
      const tipoOcorrencia = Number(form.querySelector('input[name="tipoOcorrencia"]:checked').value);
      const cep = document.getElementById('cep').value.replace(/\D/g, '');

      const payload = {
        enderecoOcorrencia: {
          rua: document.getElementById('rua').value.trim(),
          numero: checkSemNumero.checked ? 0 : Number(inputNumero.value),
          bairro: document.getElementById('bairro').value.trim(),
          cidade: document.getElementById('cidade').value.trim(),
          estado: document.getElementById('estado').value.trim().toUpperCase(),
          cep: Number(cep),
        },
        tipoOcorrencia,
        detalhes: tipoOcorrencia === 99 ? detalhesOutros.value.trim() : null,
        fotoOcorrencia,
        latitude: coordenadas.latitude,
        longitude: coordenadas.longitude,
      };

      try {
        const resposta = await Api.post(`${CONFIG.REPORT_SERVICE_URL}/api/ocorrencias`, payload);
        mostrarSucesso(`Ocorrência registrada com sucesso! Protocolo #${String(resposta.id).padStart(5, '0')}. Redirecionando...`);
        setTimeout(() => {
          window.location.href = '/cidadao/minhas-ocorrencias.html';
        }, 1500);
      } catch (erro) {
        console.error(erro);
        if (erro.status === 400) {
          mostrarErro(erro.message || 'Já existe uma ocorrência pendente do mesmo tipo neste local.');
        } else if (erro.status === 401) {
          mostrarErro('Sua sessão expirou. Faça login novamente.');
          setTimeout(() => Auth.logout(), 1500);
        } else if (erro.status === 0) {
          mostrarErro(erro.message);
        } else {
          mostrarErro('Não foi possível registrar a ocorrência. Tente novamente.');
        }
        btnRegistrar.disabled = false;
        btnRegistrar.textContent = 'Registrar ocorrência';
      }
    });
  </script>
</body>
</html>
